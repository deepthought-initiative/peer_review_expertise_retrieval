# Expertise Evaluation Pipeline
# Conda environment for reproducible scientific computing
#
# Create:  conda env create -f environment.yml
# Activate: conda activate expertise
# Update:  conda env update -f environment.yml --prune

name: expertise
channels:
  - conda-forge
  - pytorch
  - defaults

dependencies:
  - python=3.11
  - numpy>=1.24
  - pandas>=2.0
  - scipy>=1.10
  - scikit-learn>=1.3

  # NLP
  - nltk>=3.8
  - gensim>=4.3

  # PyTorch (CPU by default — swap for pytorch-cuda for GPU)
  - pytorch>=2.0
  - cpuonly  # Remove this line and add pytorch-cuda=12.1 for GPU

  # Visualization
  - matplotlib>=3.7
  - seaborn>=0.12

  # Development
  - pytest>=7.0
  - jupyter
  - ipykernel

  # pip-only packages (not available via conda)
  - pip
  - pip:
      - sentence-transformers>=2.2,<4.0
      - transformers>=4.35,<5.0
      - adapters>=0.2,<1.0
      - ptitprince>=0.2,<1.0
      - ads>=0.12,<1.0
      - tiktoken>=0.5,<1.0
